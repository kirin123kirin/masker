name: Publish to PyPI

on:
  push:
    tags:
      - "v*.*.*"   # v1.3.0 のような tag で発動

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment: pypi          # GitHub の Environment protection を使用
    permissions:
      id-token: write          # OIDC trusted publishing に必要

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: pip install build

      - name: Build sdist and wheel
        run: python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # OIDC Trusted Publishing を使用（APIトークン不要）
        # PyPI側で GitHub リポジトリを Trusted Publisher に登録する必要があります
        # 設定: https://pypi.org/manage/project/pymasking/settings/publishing/
