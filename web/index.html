<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>PII Masker</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f5f5f5; color: #222; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 2rem; }
h1 { font-size: 1.8rem; margin-bottom: 0.3rem; }
.subtitle { color: #666; margin-bottom: 2rem; font-size: 0.9rem; }
#drop-zone {
  width: 100%; max-width: 640px;
  border: 2px dashed #aaa; border-radius: 12px;
  padding: 3rem 2rem; text-align: center;
  background: #fff; cursor: pointer; transition: border-color .2s, background .2s;
}
#drop-zone.dragover { border-color: #4a90d9; background: #eaf3ff; }
#drop-zone p { color: #666; margin-top: 0.5rem; font-size: 0.85rem; }
#status { width: 100%; max-width: 640px; margin-top: 1.5rem; }
.status-card { background: #fff; border-radius: 8px; padding: 1rem 1.2rem; margin-bottom: 0.8rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); display: flex; align-items: center; gap: 0.8rem; }
.status-icon { font-size: 1.3rem; }
.status-text { flex: 1; }
.status-name { font-weight: 600; font-size: 0.95rem; }
.status-detail { font-size: 0.8rem; color: #666; margin-top: 0.15rem; }
.btn-dl { background: #2563eb; color: #fff; border: none; border-radius: 6px; padding: 0.4rem 1rem; cursor: pointer; font-size: 0.85rem; white-space: nowrap; }
.btn-dl:hover { background: #1d4ed8; }
#ner-status { width: 100%; max-width: 640px; margin-bottom: 1rem; padding: 0.6rem 1rem; border-radius: 6px; font-size: 0.85rem; }
.ner-loading { background: #fef3c7; color: #92400e; }
.ner-ready { background: #d1fae5; color: #065f46; }
.ner-error { background: #fee2e2; color: #991b1b; }
</style>
</head>
<body>
<h1>PII Masker</h1>
<p class="subtitle">個人情報・機密情報マスキングツール（ブラウザ完結）</p>

<div id="ner-status" class="ner-loading">&#x1F504; NERモデルを初期化中...</div>

<div id="drop-zone">
  <div style="font-size:2.5rem">&#x1F4C2;</div>
  <div style="font-weight:600;margin-top:0.5rem">ファイルをドロップ</div>
  <p>または クリックして選択</p>
  <p>対応形式: .txt .html .htm .svg .docx .pptx .xlsx</p>
  <input type="file" id="file-input" style="display:none" multiple accept=".txt,.html,.htm,.svg,.docx,.pptx,.xlsx">
</div>

<div id="status"></div>

<script>console.log('[index.html] scripts loading, JSZip will load next');</script>
<script src="lib/jszip.min.js" onload="console.log('[index.html] jszip loaded')" onerror="console.error('[index.html] jszip FAILED to load')"></script>
<script type="module" src="js/app.js"></script>
</body>
</html>
